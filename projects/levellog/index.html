<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LevelLog</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">L</div>
          <div>
            <p class="brand-name">LevelLog</p>
            <p class="brand-sub">行動を経験値に変える</p>
          </div>
        </div>

        <nav class="nav" aria-label="メインメニュー">
          <button class="nav-item active" data-view="today">今日</button>
          <button class="nav-item" data-view="calendar">カレンダー連携</button>
          <button class="nav-item" data-view="status">ステータス</button>
          <button class="nav-item" data-view="review">週次レビュー</button>
        </nav>

        <section class="settings">
          <label for="hourlyRate">現在の時給</label>
          <div class="money-input">
            <span>¥</span>
            <input id="hourlyRate" type="number" min="0" step="100" value="1500" />
          </div>
          <label for="futureRate">目標時給</label>
          <div class="money-input">
            <span>¥</span>
            <input id="futureRate" type="number" min="0" step="100" value="3000" />
          </div>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Prototype</p>
            <h1>今日のクエスト</h1>
          </div>
          <button class="primary-action" id="addQuestBtn">＋ 追加</button>
        </header>

        <section class="hero-panel">
          <div class="level-block">
            <span class="level-label">Lv.</span>
            <strong id="level">1</strong>
          </div>
          <div class="hero-copy">
            <h2 id="rankName">駆け出し冒険者</h2>
            <p id="progressText">次のレベルまであと 100 EXP</p>
            <div class="progress-track" aria-label="レベル進捗">
              <div id="progressFill" class="progress-fill"></div>
            </div>
          </div>
          <div class="hero-stats">
            <div>
              <span>今日のEXP</span>
              <strong id="todayExp">0</strong>
            </div>
            <div>
              <span>投資時間</span>
              <strong id="investedTime">0h</strong>
            </div>
            <div>
              <span>回収余地</span>
              <strong id="recoverableValue">¥0</strong>
            </div>
          </div>
        </section>

        <section class="view active" id="todayView">
          <div class="section-head">
            <div>
              <h2>クエスト</h2>
              <p>完了した行動だけがEXPになります。</p>
            </div>
            <div class="segmented" role="tablist" aria-label="表示切り替え">
              <button class="segment active" data-filter="all">全て</button>
              <button class="segment" data-filter="open">未完了</button>
              <button class="segment" data-filter="done">完了</button>
            </div>
          </div>
          <div class="quest-list" id="questList"></div>
        </section>

        <section class="view" id="calendarView">
          <div class="section-head">
            <div>
              <h2>カレンダー連携イメージ</h2>
              <p>Googleカレンダーから読み込んだ予定を、1タップで行動ログにします。</p>
            </div>
            <button class="secondary-action" id="importCalendarBtn">予定を読み込む</button>
          </div>
          <div class="calendar-list" id="calendarList"></div>
        </section>

        <section class="view" id="statusView">
          <div class="section-head">
            <div>
              <h2>ステータス</h2>
              <p>カテゴリごとの積み上げを見える化します。</p>
            </div>
          </div>
          <div class="status-grid" id="statusGrid"></div>
        </section>

        <section class="view" id="reviewView">
          <div class="section-head">
            <div>
              <h2>週次レビュー</h2>
              <p>努力・時間投資・見直せる時間をまとめます。</p>
            </div>
          </div>
          <div class="review-grid">
            <article class="review-card">
              <span>総EXP</span>
              <strong id="weekExp">0</strong>
            </article>
            <article class="review-card">
              <span>学習・成長の投資価値</span>
              <strong id="futureValue">¥0</strong>
            </article>
            <article class="review-card">
              <span>見直せる時間コスト</span>
              <strong id="wastedValue">¥0</strong>
            </article>
          </div>
          <div class="insight" id="weeklyInsight"></div>
        </section>
      </main>
    </div>

    <dialog id="questDialog">
      <form method="dialog" class="quest-form" id="questForm">
        <header>
          <h2>クエスト追加</h2>
          <button value="cancel" class="icon-button" aria-label="閉じる">×</button>
        </header>
        <label>
          内容
          <input id="questTitle" type="text" placeholder="例: 英語学習" required />
        </label>
        <div class="form-row">
          <label>
            時間
            <input id="questMinutes" type="number" min="5" step="5" value="30" required />
          </label>
          <label>
            難易度
            <select id="questDifficulty">
              <option value="1">ふつう</option>
              <option value="1.3">少し大変</option>
              <option value="1.6">かなり大変</option>
            </select>
          </label>
        </div>
        <label>
          カテゴリ
          <select id="questCategory">
            <option value="study">学習</option>
            <option value="work">仕事・副業</option>
            <option value="health">健康</option>
            <option value="life">生活</option>
            <option value="waste">見直し候補</option>
          </select>
        </label>
        <button class="primary-action full" value="default">追加する</button>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
